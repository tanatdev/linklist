    <!DOCTYPE html>
    <html lang="en">
    <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Data Structure Visualization</title>

    <style>
@import url('https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;600&family=IBM+Plex+Sans:wght@400;600&display=swap');

body{
    margin:0;
    padding:0;
    background:#1e1f26;
    font-family:'IBM Plex Sans', sans-serif;
    color:#e4e6eb;
}

.container{
    width:85%;
    margin:40px auto;
}

h2{
    text-align:left;
    font-weight:600;
    margin-bottom:30px;
    border-left:5px solid #4db6ac;
    padding-left:10px;
}

.top-box{
    text-align:left;
    margin-bottom:20px;
}

input{
    padding:8px 10px;
    width:240px;
    border:1px solid #555;
    border-radius:3px;
    background:#2a2c34;
    color:#fff;
    font-family:'Source Code Pro', monospace;
}

button{
    padding:6px 12px;
    margin:4px 4px 4px 0;
    border:1px solid #4db6ac;
    background:transparent;
    color:#4db6ac;
    border-radius:3px;
    cursor:pointer;
    font-size:13px;
    transition:0.2s;
}

button:hover{
    background:#4db6ac;
    color:#1e1f26;
}

.section{
    display:flex;
    gap:30px;
    margin-top:20px;
}

.card{
    background:#252733;
    padding:20px;
    width:48%;
    border-radius:4px;
    border:1px solid #333;
}

.card h3{
    text-align:left;
    font-weight:600;
    margin-bottom:10px;
    color:#4db6ac;
}

.result{
    background:#2f3241;
    padding:8px;
    margin:12px 0;
    min-height:25px;
    font-size:13px;
    font-family:'Source Code Pro', monospace;
    border-left:3px solid #4db6ac;
}

.structure{
    background:#1b1c22;
    border:1px dashed #555;
    padding:12px;
    min-height:100px;
}

/* STACK = เรียงเป็นเสา */
#stackDisplay{
    display:flex;
    flex-direction:column-reverse;
}

/* QUEUE = เรียงเป็นแถว */
#queueDisplay{
    display:flex;
    flex-direction:row;
    flex-wrap:wrap;
}

.item{
    background:#4db6ac;
    color:#1e1f26;
    padding:6px 10px;
    margin:5px;
    border-radius:3px;
    font-family:'Source Code Pro', monospace;
    font-size:13px;
}

.queue-item{
    background:#ffb74d;
    color:#1e1f26;
}
</style>
    </head>
    <body>

    <div class="container">
        <h2>Data Structure Visualization</h2>

        <div class="top-box">
            <input type="text" id="dataInput" placeholder="Enter data">
        </div>

        <div class="section">

            <!-- STACK -->
            <div class="card">
                <h3>STACK (LIFO)</h3>
                <button onclick="push()">Push</button>
                <button onclick="pop()">Pop</button>
                <button onclick="topStack()">Top</button>
                <button onclick="clearStack()">Clear</button>

                <div class="result" id="stackResult"></div>
                <div class="structure" id="stackDisplay"></div>
            </div>

            <!-- QUEUE -->
            <div class="card">
                <h3>QUEUE (FIFO)</h3>
                <button onclick="enqueue()">Enqueue</button>
                <button onclick="dequeue()">Dequeue</button>
                <button onclick="frontQueue()">Front</button>
                <button onclick="clearQueue()">Clear</button>

                <div class="result" id="queueResult"></div>
                <div class="structure" id="queueDisplay"></div>
            </div>

        </div>
    </div>

  <script>

let stack = [];
let queue = [];

// ---------- STACK ----------

function push(){
    let value = document.getElementById("dataInput").value;
    if(value === "") return;
    stack.push(value);
    document.getElementById("stackResult").innerText = "STACK Result: Pushed " + value;
    displayStack();
}

function pop(){
    if(stack.length === 0){
        document.getElementById("stackResult").innerText = "STACK Result: Stack is Empty";
        return;
    }
    let removed = stack.pop();
    document.getElementById("stackResult").innerText = "STACK Result: Popped " + removed;
    displayStack();
}

function topStack(){
    if(stack.length === 0){
        document.getElementById("stackResult").innerText = "STACK Result: Stack is Empty";
        return;
    }
    document.getElementById("stackResult").innerText = "STACK Result: Top = " + stack[stack.length - 1];
}

function clearStack(){
    stack = [];
    document.getElementById("stackResult").innerText = "STACK Result: Stack Cleared";
    displayStack();
}

function displayStack(){
    let display = document.getElementById("stackDisplay");
    display.innerHTML = "";
    for(let i = stack.length - 1; i >= 0; i--){
        display.innerHTML += `<div class="item">${stack[i]}</div>`;
    }
}

// ---------- QUEUE ----------

function enqueue(){
    let value = document.getElementById("dataInput").value;
    if(value === "") return;
    queue.push(value);
    document.getElementById("queueResult").innerText = "QUEUE Result: Enqueued " + value;
    displayQueue();
}

function dequeue(){
    if(queue.length === 0){
        document.getElementById("queueResult").innerText = "QUEUE Result: Queue is Empty";
        return;
    }
    let removed = queue.shift();
    document.getElementById("queueResult").innerText = "QUEUE Result: Dequeued " + removed;
    displayQueue();
}

function frontQueue(){
    if(queue.length === 0){
        document.getElementById("queueResult").innerText = "QUEUE Result: Queue is Empty";
        return;
    }
    document.getElementById("queueResult").innerText = "QUEUE Result: Front = " + queue[0];
}

function clearQueue(){
    queue = [];
    document.getElementById("queueResult").innerText = "QUEUE Result: Queue Cleared";
    displayQueue();
}

function displayQueue(){
    let display = document.getElementById("queueDisplay");
    display.innerHTML = "";
    for(let i = 0; i < queue.length; i++){
        display.innerHTML += `<div class="item queue-item">${queue[i]}</div>`;
    }
}

</script>

    </body>
    </html>
